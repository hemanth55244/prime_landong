<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Random Pokémon Cards</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #ffcb05, #3b4cca);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 1000px;
      text-align: center;
    }

    h1 {
      color: white;
      margin-bottom: 20px;
      text-shadow: 2px 2px 5px black;
    }

    button {
      padding: 12px 30px;
      border: none;
      border-radius: 30px;
      background: #ff1c1c;
      color: white;
      font-size: 18px;
      cursor: pointer;
      margin-bottom: 30px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }

    button:hover {
      background: #cc0000;
      transform: scale(1.05);
    }

    .pokemon-wrapper {
      display: flex;
      justify-content: center;
      gap: 25px;
      flex-wrap: wrap;
    }

    .card {
      background: white;
      width: 280px;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.3);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-10px);
    }

    .card img {
      width: 160px;
      height: 160px;
      object-fit: contain;
      background: #f2f2f2;
      border-radius: 50%;
      margin-bottom: 15px;
    }

    .card h2 {
      text-transform: capitalize;
      color: #333;
      margin-bottom: 10px;
    }

    .details {
      text-align: left;
      margin-top: 10px;
      line-height: 1.8;
      color: #444;
    }

    .type {
      display: inline-block;
      padding: 5px 12px;
      border-radius: 20px;
      background: #3b4cca;
      color: white;
      margin: 5px;
      text-transform: capitalize;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Random Pokémon Generator</h1>

    <button onclick="getRandomPokemons()">Get 2 Random Pokémons</button>

    <div class="pokemon-wrapper" id="pokemonContainer"></div>
  </div>

  <script>
    const pokemonContainer = document.getElementById("pokemonContainer");

    async function getRandomPokemons() {
      pokemonContainer.innerHTML = "";

      for (let i = 0; i < 2; i++) {
        const randomId = Math.floor(Math.random() * 1025) + 1;

        const response = await fetch(`https://pokeapi.co/api/v2/pokemon/${randomId}`);
        const pokemon = await response.json();

        displayPokemon(pokemon);
      }
    }

    function displayPokemon(pokemon) {
      const image =
        pokemon.sprites.other["official-artwork"].front_default ||
        pokemon.sprites.front_default;

      const types = pokemon.types
        .map(item => `<span class="type">${item.type.name}</span>`)
        .join("");

      const abilities = pokemon.abilities
        .map(item => item.ability.name)
        .join(", ");

      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <img src="${image}" alt="${pokemon.name}">
        <h2>${pokemon.name}</h2>

        <div>${types}</div>

        <div class="details">
          <p><b>ID:</b> #${pokemon.id}</p>
          <p><b>Height:</b> ${pokemon.height}</p>
          <p><b>Weight:</b> ${pokemon.weight}</p>
          <p><b>Base Experience:</b> ${pokemon.base_experience}</p>
          <p><b>Abilities:</b> ${abilities}</p>
        </div>
      `;

      pokemonContainer.appendChild(card);
    }

    getRandomPokemons();
  </script>
</body>
</html>
