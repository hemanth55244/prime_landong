<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokemon Battle</title>

  <style>
* {
  box-sizing: border-box;
  font-family: Arial, Helvetica, sans-serif;
}

body {
  margin: 0;
  background: #eef3f7;
  color: #30343b;
}

h1 {
  margin: 28px 55px;
  color: #2296c8;
  font-weight: 500;
}

.browser {
  width: 88%;
  margin: 0 auto 40px;
  background: #ffffff;
  border: 2px solid #3f444b;
  border-radius: 8px;
  overflow: hidden;
  box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
}

.topbar {
  height: 54px;
  background: #d5d7da;
  border-bottom: 2px solid #3f444b;
  display: flex;
  align-items: center;
  gap: 13px;
  padding: 10px;
  font-size: 26px;
  color: #2f3338;
}

.url {
  flex: 1;
  height: 28px;
  background: #ffffff;
  border: 2px solid #3f444b;
  border-radius: 6px;
}

.battle-area {
  margin: 34px;
  height: 480px;
  position: relative;
  background: #fbfbfb;
  border: 2px solid #3f444b;
  border-radius: 8px;
  overflow: hidden;
}

.battle-area::before {
  content: "";
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  height: 42%;
  background: linear-gradient(#f7fbf4, #e4efd9);
  z-index: 0;
}

.battle-area::after {
  content: "";
  position: absolute;
  left: 12%;
  bottom: 55px;
  width: 260px;
  height: 45px;
  background: rgba(80, 80, 80, 0.18);
  border-radius: 50%;
  z-index: 1;
}

.pokemon-img {
  width: 180px;
  image-rendering: pixelated;
  position: relative;
  z-index: 2;
  animation: gentleMove 2.2s ease-in-out infinite;
}

.enemy-img {
  position: absolute;
  right: 130px;
  top: 80px;
}

.player-img {
  position: absolute;
  left: 115px;
  bottom: 45px;
  width: 210px;
}

.info-box {
  position: absolute;
  width: 430px;
  background: #ffffff;
  border: 2px solid #3f444b;
  border-radius: 8px;
  padding: 20px;
  font-size: 28px;
  font-weight: 700;
  text-transform: capitalize;
  color: #30343b;
  z-index: 3;
  box-shadow: 4px 4px 0 rgba(0, 0, 0, 0.08);
}

.enemy-box {
  left: 35px;
  top: 40px;
}

.player-box {
  right: 120px;
  bottom: 75px;
}

.attack {
  float: right;
  font-size: 14px;
  background: #d9f7df;
  color: #276738;
  padding: 8px 16px;
  border-radius: 18px;
  border: 1px solid #9bd5a7;
  font-weight: 600;
}

.player-box .attack {
  background: #dcecff;
  color: #28537a;
  border-color: #9fc4ea;
}

.details {
  clear: both;
  margin-top: 12px;
  padding-top: 10px;
  border-top: 1px solid #eeeeee;
  font-size: 14px;
  font-weight: normal;
  line-height: 1.6;
  color: #555;
  text-transform: none;
}

.bottom {
  display: flex;
  gap: 35px;
  align-items: flex-start;
  margin: 0 35px 35px;
}

.log-section {
  flex: 1;
}

.log-section h2 {
  margin: 0 0 8px;
  font-size: 22px;
  color: #30343b;
}

#battleLog {
  height: 150px;
  background: #ffffff;
  border: 2px solid #3f444b;
  border-radius: 8px;
  padding: 18px;
  font-size: 22px;
  color: #3f444b;
  line-height: 1.4;
}

button {
  width: 190px;
  padding: 12px;
  margin-top: 35px;
  background: #ffffff;
  border: 2px solid #3f444b;
  border-radius: 10px;
  color: #30343b;
  font-size: 21px;
  cursor: pointer;
  transition: 0.2s ease;
}

button:hover {
  background: #ffcf4d;
  transform: translateY(-2px);
  box-shadow: 3px 4px 0 #3f444b;
}

button:active {
  transform: translateY(1px);
  box-shadow: none;
}

@keyframes gentleMove {
  0%, 100% {
    transform: translateY(0);
  }

  50% {
    transform: translateY(-8px);
  }
}

@media (max-width: 900px) {
  h1 {
    margin: 20px;
  }

  .browser {
    width: 95%;
  }

  .battle-area {
    height: auto;
    padding: 20px;
  }

  .battle-area::before,
  .battle-area::after {
    display: none;
  }

  .enemy-img,
  .player-img,
  .info-box {
    position: static;
    display: block;
    margin: 18px auto;
  }

  .info-box {
    width: 90%;
  }

  .bottom {
    flex-direction: column;
  }

  button {
    margin-top: 0;
  }
}
  </style>
</head>

<body>

  <h1>Battle Wireframe</h1>

  <div class="browser">
    <div class="topbar">
      ← → ⟳ 🏠
      <div class="url"></div>
    </div>

    <div class="battle-area">
      <div class="info-box enemy-box" id="pokemon1Box"></div>
      <img id="pokemon1Img" class="pokemon-img enemy-img" />

      <img id="pokemon2Img" class="pokemon-img player-img" />
      <div class="info-box player-box" id="pokemon2Box"></div>
    </div>

    <div class="bottom">
      <div class="log-section">
        <h2>Battle Log</h2>
        <div id="battleLog">Click Start Battle to generate two random Pokémon.</div>
      </div>

      <button onclick="startBattle()">Start Battle!</button>
    </div>
  </div>

  <script>
    const attacks = [
      "Razor Wind",
      "Scratch",
      "Thunder Shock",
      "Quick Attack",
      "Fire Blast",
      "Water Gun",
      "Tackle",
      "Vine Whip"
    ];

    async function getPokemon(id) {
      const response = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`);
      return await response.json();
    }

    function randomAttack() {
      const name = attacks[Math.floor(Math.random() * attacks.length)];
      const power = Math.floor(Math.random() * 70) + 30;
      return { name, power };
    }

    function showPokemon(pokemon, boxId, imgId, attack) {
      const img =
        pokemon.sprites.versions["generation-v"]["black-white"].animated.front_default ||
        pokemon.sprites.other["official-artwork"].front_default ||
        pokemon.sprites.front_default;

      document.getElementById(imgId).src = img;

      document.getElementById(boxId).innerHTML = `
        ${pokemon.name}
        <span class="attack">${attack.name}: ${attack.power}</span>

        <div class="details">
          <b>ID:</b> #${pokemon.id}<br>
          <b>Height:</b> ${pokemon.height}<br>
          <b>Weight:</b> ${pokemon.weight}<br>
          <b>Base XP:</b> ${pokemon.base_experience}<br>
          <b>Type:</b> ${pokemon.types.map(t => t.type.name).join(", ")}
        </div>
      `;
    }

    async function startBattle() {
      document.getElementById("battleLog").innerText = "Loading Pokémon...";

      const id1 = Math.floor(Math.random() * 151) + 1;
      const id2 = Math.floor(Math.random() * 151) + 1;

      const pokemon1 = await getPokemon(id1);
      const pokemon2 = await getPokemon(id2);

      const attack1 = randomAttack();
      const attack2 = randomAttack();

      showPokemon(pokemon1, "pokemon1Box", "pokemon1Img", attack1);
      showPokemon(pokemon2, "pokemon2Box", "pokemon2Img", attack2);

      let winner;
      let loser;
      let winningAttack;

      if (attack1.power >= attack2.power) {
        winner = pokemon1.name;
        loser = pokemon2.name;
        winningAttack = attack1.name;
      } else {
        winner = pokemon2.name;
        loser = pokemon1.name;
        winningAttack = attack2.name;
      }

      document.getElementById("battleLog").innerText =
        `${winner} lands a decisive blow with ${winningAttack}, knocking out ${loser}!`;
    }
  </script>

</body>
</html>
