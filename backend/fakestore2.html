<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        .box{
            width: 400px;
            height: 400px;
            display: flex;
            flex-direction: column;
            background-color: antiquewhite;
        }
        #imgid{
            width: 100px;
            height: 100px;
        }
    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <label for="productid">Enter product id</label>
    <input type="num" id="productid">
    <button onclick="fakestore()"> search </button>

    <div class="box">
        
        <img src="" id="imgid" >
        <p id="prodname"></p>
        <p id="prodprice"></p>
        <p id="proddescription"></p>
        <p id="prodcategory"></p>
        
    </div>
    <script>

     async function fakestore(params) {
            try{
                productid = document.getElementById("productid").value

                const response = await fetch(`https://fakestoreapi.com/products/${productid}`)
                if(!response.ok)
            {
                throw new error("data fetch failed")
            }
                const data = await response.json()
                const imgurl = data.image
                document.getElementById("imgid").src = imgurl
                const productname = document.getElementById("prodname")
                const price = document.getElementById("prodprice")
                const description = document.getElementById("proddescription")
                const category = document.getElementById("prodcategory")
                productname.textContent = "Product Name: " + data.title
                price.textContent = "Product price: " + data.price
                description.textContent = "Product description: " + data.description
                category.textContent = "Product category : " + data.category

                

            }
            catch(error)
            {
            }
        }

    </script>
</body>
</html>
